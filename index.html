<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>store</title>
  </head>
  <body>
    <div class="global-texture"></div>
    <div class="glow-orb-global glow-orb-1-global"></div>
    <div class="glow-orb-global glow-orb-2-global"></div>
    <div class="glow-orb-global glow-orb-3-global"></div>

    <div class="floating-global">
      <div class="floating-icon" style="top: 15%; left: 5%; animation-delay: 0s;">
        <svg width="30" height="30" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="50" cy="50" r="25"/>
          <path d="M50 25 L50 75 M25 50 L75 50"/>
        </svg>
      </div>
      <div class="floating-icon" style="top: 70%; right: 8%; animation-delay: 2s;">
        <svg width="30" height="30" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M50 20 L70 50 L50 80 L30 50 Z"/>
        </svg>
      </div>
      <div class="floating-icon" style="bottom: 15%; left: 12%; animation-delay: 4s;">
        <svg width="30" height="30" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M30 50 L70 50 M50 30 L50 70"/>
        </svg>
      </div>
    </div>

    <div class="global-particles" id="global-particles"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const particlesContainer = document.getElementById('global-particles');
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'global-particle';
        const size = Math.random() * 6 + 2;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDelay = `${Math.random() * 15}s`;
        particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
        particlesContainer.appendChild(particle);
      }
    </script>
  </body>
</html>
